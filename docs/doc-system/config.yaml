# ドキュメントシステム グローバル設定
# 検証ツールがここを読んで scheduled 抑制・ステージ抑制を判定する

current_phase: "sprint-1"
current_stage: "requirements"   # requirements | analysis | design | implementation | verification

# フェーズの順序（インデックスで大小比較）
phases:
  - sprint-1
  - sprint-2
  - sprint-3
  - post-mvp

# ステージ×レイヤーのスコープ
# full: このステージでフル検査（元の深刻度）
# warn: このステージでは ERROR → WARNING に降格
stage_scope:
  requirements:
    full: [VAL, SR, FR, SPEC, NFR]
    warn: [TERM, ACTOR, I, O, P, E, ORC, DS, MOD, DM, PORT, PRS, SCM, CFG, PROMPT, SRC, TD, TC, TR, VERIFY, FND, DD, Q, PEND]
  analysis:
    full: [VAL, SR, FR, SPEC, NFR, TERM, ACTOR, I, O, P, E, TD]
    warn: [ORC, DS, MOD, DM, PORT, PRS, SCM, CFG, PROMPT, SRC, TC, TR, VERIFY, FND]
  design:
    full: [VAL, SR, FR, SPEC, NFR, TERM, ACTOR, I, O, P, E, ORC, DS, MOD, DM, PORT, PRS, SCM, CFG, PROMPT, TD]
    warn: [SRC, TC, TR, VERIFY, FND]
  implementation:
    full: [VAL, SR, FR, SPEC, NFR, TERM, ACTOR, I, O, P, E, ORC, DS, MOD, DM, PORT, PRS, SCM, CFG, PROMPT, SRC, TD, TC]
    warn: [TR, VERIFY, FND]
  verification:
    full: [VAL, SR, FR, SPEC, NFR, TERM, ACTOR, I, O, P, E, ORC, DS, MOD, DM, PORT, PRS, SCM, CFG, PROMPT, SRC, TD, TC, TR, VERIFY, FND]
    warn: []

# SPEC/TD の condition 属性の有効語彙（RULE-016 の検証対象）
# ここに列挙した値以外は RULE-016 で WARNING
condition_vocab:
  - normal    # 正常系：有効な入力・正常な状態 → 期待通りに動く
  - boundary  # 境界値：有効/無効の境目にある入力・状態（pass か fail かは SPEC 本文で明示）
  - failure   # 不成立：無効な入力・業務ルール違反 → 拒否応答
  - error     # 異常：インフラ障害・タイムアウト → フェイルセーフ応答

# カバレッジ要件（RULE-017/018 の判定基準）
coverage_rules:
  FR:
    required_conditions:     [normal]           # SPEC に必須（なければ RULE-017 WARNING）
    recommended_conditions:  [failure, error]   # あることを推奨（なければ RULE-018 INFO）

# 抑制対象外ルール（suppress/scheduled/stage いずれでも抑制不可）
always_error:
  - RULE-007   # 存在しない ID への参照
