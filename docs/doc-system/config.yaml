# ドキュメントシステム グローバル設定
# 検証ツールがここを読んで scheduled 抑制・ステージ抑制を判定する

current_phase: "sprint-1"
current_stage: "requirements"   # requirements | analysis | design | implementation | verification

# フェーズの順序（インデックスで大小比較）
phases:
  - sprint-1
  - sprint-2
  - sprint-3
  - post-mvp

# ステージ×ルール×ノードタイプ の無効化リスト
# disable エントリの {rule, on} に一致するノードタイプへのルール評価をスキップする
# always_error（RULE-007）は disable 対象に含めても無効（常に発火）
stage_scope:
  requirements:
    disable:
      - {rule: RULE-015, on: SPEC}     # TD verifies 不要: TD 未作成
      - {rule: RULE-011, on: NFR}      # validates 不要: 検証層未作成
      - {rule: RULE-009, on: FND}      # found-in 不要: 検証層未作成
      - {rule: RULE-010, on: FND}      # validates 不要: 検証層未作成
      - {rule: RULE-012, on: TC}       # realizes 不要: 検証層未作成
      - {rule: RULE-013, on: VERIFY}   # verifies 不要: 検証層未作成
      - {rule: RULE-020, on: TR}       # result 不要: 検証層未作成
      - {rule: RULE-021, on: TR}       # log_ref 不要: 検証層未作成
  analysis:
    disable:
      - {rule: RULE-015, on: SPEC}
      - {rule: RULE-011, on: NFR}
      - {rule: RULE-009, on: FND}
      - {rule: RULE-010, on: FND}
      - {rule: RULE-012, on: TC}
      - {rule: RULE-013, on: VERIFY}
      - {rule: RULE-020, on: TR}
      - {rule: RULE-021, on: TR}
  design:
    disable:
      - {rule: RULE-009, on: FND}
      - {rule: RULE-010, on: FND}
      - {rule: RULE-012, on: TC}
      - {rule: RULE-013, on: VERIFY}
      - {rule: RULE-020, on: TR}
      - {rule: RULE-021, on: TR}
  implementation:
    disable:
      - {rule: RULE-009, on: FND}
      - {rule: RULE-010, on: FND}
      - {rule: RULE-013, on: VERIFY}
      - {rule: RULE-020, on: TR}
      - {rule: RULE-021, on: TR}
  verification:
    disable: []   # 全ルールフル検査

# SPEC/TD の condition 属性の有効語彙（RULE-016 の検証対象）
# ここに列挙した値以外は RULE-016 で WARNING
condition_vocab:
  - normal    # 正常系：有効な入力・正常な状態 → 期待通りに動く
  - boundary  # 境界値：有効/無効の境目にある入力・状態（pass か fail かは SPEC 本文で明示）
  - failure   # 不成立：無効な入力・業務ルール違反 → 拒否応答
  - error     # 異常：インフラ障害・タイムアウト → フェイルセーフ応答

# カバレッジ要件（RULE-017/018 の判定基準）
coverage_rules:
  FR:
    required_conditions:     [normal]           # SPEC に必須（なければ RULE-017 WARNING）
    recommended_conditions:  [failure, error]   # あることを推奨（なければ RULE-018 INFO）

# 抑制対象外ルール（suppress/scheduled/stage_scope いずれでも抑制不可）
always_error:
  - RULE-007   # 存在しない ID への参照
