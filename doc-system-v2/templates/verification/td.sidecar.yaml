# テンプレ: TD（テスト設計）。path: nodes/04-verification/td/{slug}.yaml
# condition（RULE-016 ERROR）は verifies 先 SPEC の condition と一致（RULE-019）。1ノード=1条件。
title: "[テストシナリオ名]"
version: "0.1.0"
condition: normal   # verifies 先 SPEC と一致（normal|boundary|empty|failure|error）
labels: []
scheduled: ""   # 既定=current_phase を設定。空/別 sprint はオーナー承認時のみ（スケジュール独断禁止）
edges:
  # 必須（TD→SPEC・verifies）: 検証する機能仕様＝カバレッジ証跡（config must_link_to td→spec）
  - to: "[検証する SPEC の slug]"
    ref_version: "0.1"
