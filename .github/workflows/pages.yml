name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install coverage.py
        run: python -m pip install coverage

      - name: Run tests with coverage
        run: python -m coverage run -m unittest discover -s tests -p "test_*.py"

      - name: Write coverage summary
        run: python -m coverage report -m --skip-covered

      - name: Build coverage HTML
        run: python -m coverage html

      - name: Prepare Pages site
        run: mkdir -p _site/coverage

      - name: Build doc-system v2 viewer
        run: python -m dsv2 build-view --root doc-system-v2 --out _site/doc_view.html

      - name: Assemble Pages site
        run: |
          cp -R htmlcov/. _site/coverage/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
